<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дата рождения</title>
</head>
<body>
  <h1>Дата рождения</h1>

  <label>
    День:
    <input id="day" type="number" min="1" max="31">
  </label>
  <br>

  <label>
    Месяц:
    <input id="month" type="number" min="1" max="12">
  </label>
  <br>

  <label>
    Год:
    <input id="year" type="number" min="1">
  </label>
  <br>

  <button id="button">Показать результат</button>

  <p id="result"></p>
  <pre id="stars"></pre>

  <script src="script.js"></script>
</body>
</html>
