<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Слайдер изображений</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="slider">
      <h1>Слайдер изображений</h1>

      <div class="image-box">
        <img id="slider-image" src="images/image-1.svg" alt="Изображение слайдера">
      </div>

      <p id="counter" class="counter">Изображение 1 из 5</p>

      <div class="buttons">
        <button id="prev-button" type="button">Назад</button>
        <button id="next-button" type="button">Вперед</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
